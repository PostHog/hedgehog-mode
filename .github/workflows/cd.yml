name: "Release"

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check package version and detect an update
        id: check-package-version
        uses: PostHog/check-package-version@f540540cb12d45ec3c58d42dbf1d60070ed2d268 # v2.1.1
        with:
          path: hedgehog-mode

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        if: steps.check-package-version.outputs.is-new-version == 'true'
        name: Install pnpm
        with:
          run_install: false

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.check-package-version.outputs.is-new-version == 'true'
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - name: Ensure latest npm with OIDC support (npm 11.5.1+)
        shell: bash
        run: npm install -g npm@11.6.4

      - name: Install dependencies
        if: steps.check-package-version.outputs.is-new-version == 'true'
        run: pnpm install

      - name: Build
        if: steps.check-package-version.outputs.is-new-version == 'true'
        working-directory: hedgehog-mode
        run: pnpm build

      - name: Publish the package in the npm registry
        id: publish-package
        if: steps.check-package-version.outputs.is-new-version == 'true'
        working-directory: hedgehog-mode
        run: |
          tag="alpha"
          echo "tag=alpha" >> $GITHUB_OUTPUT
          if [[ $VERSION =~ ^[0-9]+(\.[0-9]+){2,3}$ ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            tag="latest"
          fi

          npm publish --access public --tag $tag --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: true
          VERSION: ${{ steps.check-package-version.outputs.committed-version }}
