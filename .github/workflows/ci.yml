name: Build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          registry-url: https://npm.pkg.github.com/
          node-version: 22.x
          scope: "@posthog"

      - name: pnpm install, build, and test
        run: |
          pnpm install
          pnpm build
