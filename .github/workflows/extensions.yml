name: Browser extension packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build Chrome and Firefox packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          pnpm lint
          pnpm format:check
          pnpm test
          pnpm --dir hedgehog-mode build
          pnpm --dir hedgehog-mode-anywhere lint:firefox

      - name: Package browser extensions
        run: |
          pnpm --dir hedgehog-mode-anywhere package:chrome
          pnpm --dir hedgehog-mode-anywhere package:firefox
          git archive --format=zip --output=hedgehog-mode-anywhere/artifacts/hedgehog-mode-source.zip HEAD

      - name: Upload Chrome package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hedgehog-mode-chrome-${{ github.sha }}
          path: hedgehog-mode-anywhere/artifacts/hedgehog-mode-chrome.zip
          if-no-files-found: error

      - name: Upload Firefox package and source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hedgehog-mode-firefox-${{ github.sha }}
          path: |
            hedgehog-mode-anywhere/artifacts/hedgehog-mode-firefox.zip
            hedgehog-mode-anywhere/artifacts/hedgehog-mode-source.zip
          if-no-files-found: error
