<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hedgehog Mode</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        width: 520px;
        padding: 20px;
        background: #1d1f27;
        color: #fff;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
      }

      .link-icon {
        width: 16px;
        height: 16px;
        opacity: 0.5;
        cursor: pointer;
      }

      .link-icon:hover {
        opacity: 0.8;
      }

      .top-toggles {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .toggle-pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        background: #2c2f3e;
        border-radius: 20px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
      }

      .toggle-pill:hover {
        background: #3c4152;
      }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #4b5167;
        transition: 0.3s;
        border-radius: 20px;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      .toggle input:checked + .toggle-slider {
        background-color: #d4a019;
      }

      .toggle input:checked + .toggle-slider:before {
        transform: translateX(16px);
      }

      .options-toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .option-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: #2c2f3e;
        border-radius: 20px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }

      .option-toggle:hover {
        background: #3c4152;
      }

      .option-toggle .toggle {
        width: 32px;
        height: 18px;
      }

      .option-toggle .toggle-slider:before {
        height: 12px;
        width: 12px;
      }

      .option-toggle .toggle input:checked + .toggle-slider:before {
        transform: translateX(14px);
      }

      #hedgehog-customization {
        display: block;
      }

      .footer {
        margin-top: 20px;
        padding-top: 12px;
        border-top: 1px solid #3c4152;
        text-align: center;
        font-size: 11px;
        color: #6b7280;
      }

      .footer a {
        color: #d4a019;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="dist/popup.js"></script>
  </body>
</html>
